<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik Player</title>
<link rel="stylesheet" href="stats.css">
</head>
<body>

<div class="bg-overlay"></div>

<div class="stats-container">
    <aside class="sidebar glass">
        <div class="menu" onclick="goProfile()">Profil</div>
        <div class="menu battlefield-menu" onclick="goBattlefield()">Battlefield</div>
        <div class="menu active stats-menu">Statistik</div>
    </aside>

    <main class="main">
        <h2>Statistik Player</h2>
        <table class="stats-table">
            <tr>
                <th>Kill Terbanyak</th>
                <td id="maxKill">0</td>
            </tr>
            <tr>
                <th>KDA</th>
                <td id="kda">0</td>
            </tr>
            <tr>
                <th>Assist Terbanyak</th>
                <td id="assist">0</td>
            </tr>
            <tr>
                <th>Damage Diterima</th>
                <td id="damageTaken">0</td>
            </tr>
            <tr>
                <th>Damage Diberikan</th>
                <td id="damageGiven">0</td>
            </tr>
            <tr>
                <th>Gold per Menit</th>
                <td id="gpm">0</td>
            </tr>
            <tr>
                <th>MVP Terbanyak</th>
                <td id="mvp">0</td>
            </tr>
        </table>
    </main>

    <a href="profile.html" class="back-btn">← Back</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const stats = JSON.parse(localStorage.getItem("playerStats")) || {
        maxKill: 0,
        kill: 0,
        assist: 0,
        damageTaken: 0,
        damageGiven: 0,
        gpm: 0,
        mvp: 0
    };

    document.getElementById("maxKill").textContent = stats.maxKill;
    document.getElementById("assist").textContent = stats.assist;
    document.getElementById("damageTaken").textContent = stats.damageTaken;
    document.getElementById("damageGiven").textContent = stats.damageGiven;
    document.getElementById("gpm").textContent = stats.gpm;
    document.getElementById("mvp").textContent = stats.mvp;

    const kda = stats.kill + stats.assist > 0 ? ((stats.kill + stats.assist) / Math.max(stats.deaths || 1,1)).toFixed(2) : 0;
    document.getElementById("kda").textContent = kda;
});

function goProfile(){ window.location.href="profile.html"; }
function goBattlefield(){ window.location.href="battlefield.html"; }
</script>

</body>
</html>
