<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Tes Game - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background">
        <div class="login-container">

            <div class="logo">Tes Game</div>
            <h2>Login Account</h2>

            <form id="loginForm">

                <div class="input-group">
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required>
                    <label>Password</label>
                </div>

                <button type="submit" class="btn-login">
                    LOGIN
                </button>

                <p class="register">
                    Don't have account?
                    <a href="register.html">Register</a>
                </p>

            </form>

            <p id="message"></p>

        </div>
    </div>

    <script type="module">
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import { getAuth, signInWithEmailAndPassword }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3C1eDqtcVgPYtMPC3s716s5A_nboxcxU",
            authDomain: "argamoba-99ebd.firebaseapp.com",
            projectId: "argamoba-99ebd",
            storageBucket: "argamoba-99ebd.firebasestorage.app",
            messagingSenderId: "968414985219",
            appId: "1:968414985219:web:3b635ae081776d7ff4e236"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email =
                document.getElementById("email").value.trim();

            const password =
                document.getElementById("password").value.trim();

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "profil.html";

            } catch (error) {
                document.getElementById("message").innerText = "Login gagal!";
            }
        });
    </script>

</body>
</html>
